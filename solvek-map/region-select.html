<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주소 선택 | 솔브케이</title>
  <link rel="stylesheet" href="/css/index.css">
</head>
<body>

  <div class="region-select">
    <div class="region-select__tabs">
      <button type="button" class="region-select__tab" aria-haspopup="listbox" aria-expanded="false" aria-controls="region-select-panel-0">
        <span class="body3-r-14 color-slate-900">광역시・도</span>
      </button>
      <i class="chevron-right-slate-700 region-select__divider-icon" aria-hidden="true"></i>
      <button type="button" class="region-select__tab" aria-haspopup="listbox" aria-expanded="false" aria-controls="region-select-panel-1">
        <span class="body3-r-14 color-slate-900">시・군・구</span>
      </button>
      <i class="chevron-right-slate-700 region-select__divider-icon" aria-hidden="true"></i>
      <button type="button" class="region-select__tab" aria-haspopup="listbox" aria-expanded="false" aria-controls="region-select-panel-2">
        <span class="body3-r-14 color-slate-900">읍・면・동</span>
      </button>
    </div>

    <ul id="region-select-panel-0" class="region-select__panel z-index-10" role="listbox" aria-label="광역시・도 선택">
      <li class="region-select__item active" role="option" aria-selected="true">서울특별시</li>
      <li class="region-select__item" role="option" aria-selected="false">부산광역시</li>
      <li class="region-select__item" role="option" aria-selected="false">대구광역시</li>
      <li class="region-select__item" role="option" aria-selected="false">인천광역시</li>
      <li class="region-select__item" role="option" aria-selected="false">광주광역시</li>
      <li class="region-select__item" role="option" aria-selected="false">대전광역시</li>
    </ul>

    <ul id="region-select-panel-1" class="region-select__panel z-index-10" role="listbox" aria-label="시・군・구 선택">
      <li class="region-select__item active" role="option" aria-selected="true">강남구</li>
      <li class="region-select__item" role="option" aria-selected="false">강동구</li>
      <li class="region-select__item" role="option" aria-selected="false">강북구</li>
      <li class="region-select__item" role="option" aria-selected="false">강서구</li>
      <li class="region-select__item" role="option" aria-selected="false">관악구</li>
      <li class="region-select__item" role="option" aria-selected="false">광진구</li>
    </ul>

    <ul id="region-select-panel-2" class="region-select__panel z-index-10" role="listbox" aria-label="읍・면・동 선택">
      <li class="region-select__item active" role="option" aria-selected="true">역삼동</li>
      <li class="region-select__item" role="option" aria-selected="false">삼성동</li>
      <li class="region-select__item" role="option" aria-selected="false">대치동</li>
      <li class="region-select__item" role="option" aria-selected="false">청담동</li>
      <li class="region-select__item" role="option" aria-selected="false">논현동</li>
      <li class="region-select__item" role="option" aria-selected="false">개포동</li>
    </ul>
  </div>

  <script src="/solvek-map/js/region-select.js"></script>

</body>
</html>
