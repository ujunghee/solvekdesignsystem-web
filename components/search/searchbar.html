    <!-- 검색 응용 예시 -->
    <p class="pt-10 pb-10 body2-r-16 color-slate-900">검색 응용 예시</p>
    <div class="search-wrapper">
      <div class="search-54 flex pl-20 pr-16 justify-between align-center">
        <input type="search" class="body1-r-18 w-full search-input" placeholder="검색어를 입력해주세요" id="example">
        <button type="button" class="search-button h-fit">
          <i class="search-icon-54">
            <span class="blind">검색 버튼</span>
          </i>
        </button>
      </div>
      <div class="search-popup py-8" role="dialog" aria-modal="true" aria-labelledby="example">
        <div class="search flex align-center justify-between align-center">
          <p class="body2-sb-16 color-slate-900 pl-20">최근 검색어</p>
          <button type="button" class="transparent-button-40">전체삭제</button>
        </div>
        <ul>
          <li class="px-20 flex align-center justify-between align-center">
            <a href="#" class="flex align-center gap-8 py-8">
              <i class="clock-icon">
                <span class="blind">시계 아이콘</span>
              </i>
              <span class="body2-r-16 color-slate-900">최근 검색어 1</span>
            </a>
            <button type="button">
              <i class="close-icon"><span class="blind">닫기 버튼</span></i>
            </button>
          </li>
          <li class="px-20 flex align-center justify-between">
            <a href="#" class="flex align-center gap-8 py-8">
              <i class="clock-icon">
                <span class="blind">시계 아이콘</span>
              </i>
              <span class="body2-r-16 color-slate-900">최근 검색어 1</span>
            </a>
            <button type="button">

          </li>
        </ul>
      </div>
    </div>
  </body>
  <script>
    const searchWrapper = document.querySelector('.search-wrapper')
    const searchPopup = document.querySelector('.search-popup')
    const searchInput = searchWrapper.querySelector('.search-input')

    function openSearchPopup() {
      searchPopup.classList.add('active')
    }

    function closeSearchPopup() {
      searchPopup.classList.remove('active')
    }

    // input 클릭·포커스 시 열림 (호버 대신)
    searchInput.addEventListener('click', (e) => {
      e.stopPropagation()
      openSearchPopup()
    })

    searchInput.addEventListener('focus', () => {
      openSearchPopup()
    })

    // 래퍼 바깥 클릭 시 닫힘 (팝업·검색줄 안은 유지)
    document.addEventListener('click', (e) => {
      if (!searchWrapper.contains(e.target)) {
        closeSearchPopup()
      }
    })
  </script>
