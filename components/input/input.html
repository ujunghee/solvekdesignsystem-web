  <!DOCTYPE html>
  <html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input</title>

    <link rel="stylesheet" href="/css/index.css">
    <!-- input css s -->
    <link rel="stylesheet" href="input.css">
    <!-- input css e -->
  </head>
  <body>
    <!-- text input lg -->
    <div class="input-wrapper">
      <label class="body2-r-16 color-slate-900 mb-6 block">text input lg</label>
      <input type="text" class="input-field-default-lg" placeholder="내용을 작성해주세요" disabled>
    </div>

    <!-- text input md -->
    <div class="input-wrapper">
      <label class="body2-r-16 color-slate-900 mb-6 block">text input md</label>
      <input type="text" class="input-field-default-md" placeholder="내용을 작성해주세요">
    </div>

    <!-- text input s -->
    <div class="input-wrapper">
      <label class="body2-r-16 color-slate-900 mb-6 block">text input s</label>
      <input type="text" class="input-field-default-s" placeholder="내용을 작성해주세요">
    </div>

    <!-- text error -->
    <div class="input-wrapper is-error">
      <label class="body2-r-16 color-slate-900 mb-6 block">error input</label>
      <input type="text" class="input-field-default-lg" placeholder="내용을 작성해주세요">
      <p class="error-message">에러 메시지</p>
    </div>

    <!-- password input -->
    <div class="input-wrapper">
      <label class="body2-r-16 color-slate-900 mb-6 block">password input</label>
      <div class="relative w-fit flex align-center">
        <input type="password" class="input-field-default-lg" placeholder="비밀번호를 입력해주세요">
        <button type="button" class="absolute right-0 top-50 translate-y-50">
          <i class="eye-icon">
            <span class="blind">비밀번호 보기</span>
          </i>
        </button>
      </div>
    </div>


  </body>
  <script>
    const eyeIcon = document.querySelector('.eye-icon');
    const passwordInput = document.querySelector('input[type="password"]');
    eyeIcon.addEventListener('click', () => {
      eyeIcon.classList.toggle('active');
      if(eyeIcon.classList.contains('active')) {
        eyeIcon.src = '/image/icon/eye-open.png';
        eyeIcon.alt = '비밀번호 숨기기';
        passwordInput.type = 'text';

      } else {
        eyeIcon.src = '/image/icon/eye-closed.png';
        eyeIcon.alt = '비밀번호 보기';
        passwordInput.type = 'password';
      }
    });
  </script>
  </html>
