<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>select</title>

  <link rel="stylesheet" type="text/css" href="/css/index.css">
</head>
<body>
  <!-- select-48 -->
  <div class="select-wrapper">
    <label class="body2-r-16 color-slate-900 mb-6 block" for="select-48">레이블 (48)</label>
    <select id="select-48" class="select-48 flex align-center" name="select-48" aria-label="선택">
      <option value="" disabled selected hidden>선택하세요</option>
      <option value="1">옵션 1</option>
      <option value="2">옵션 2</option>
      <option value="3">옵션 3</option>
    </select>
  </div>

  <!-- select-40 -->
  <div class="select-wrapper">
    <label class="body2-r-16 color-slate-900 mb-6 block" for="select-40">레이블 (40)</label>
    <select id="select-40" class="select-40 flex align-center" name="select-40" aria-label="선택">
      <option value="" disabled selected hidden>선택하세요</option>
      <option value="1">옵션 1</option>
      <option value="2">옵션 2</option>
      <option value="3">옵션 3</option>
    </select>
  </div>

  <!-- select-36 -->
  <div class="select-wrapper">
    <label class="body2-r-16 color-slate-900 mb-6 block" for="select-36">레이블 (36)</label>
    <select id="select-36" class="select-36 flex align-center" name="select-36" aria-label="선택">
      <option value="" disabled selected hidden>선택하세요</option>
      <option value="1">옵션 1</option>
      <option value="2">옵션 2</option>
      <option value="3">옵션 3</option>
    </select>
  </div>

  <!-- 에러: wrapper에만 is-error — select-40 예시 -->
  <div class="select-wrapper is-error">
    <label class="body2-r-16 color-slate-900 mb-6 block" for="select-error">레이블 (에러)</label>
    <select id="select-error" class="select-40 flex align-center" name="select-error" aria-invalid="true" aria-label="선택">
      <option value="" disabled selected hidden>선택하세요</option>
      <option value="1">옵션 1</option>
      <option value="2">옵션 2</option>
      <option value="3">옵션 3</option>
    </select>
    <p class="error-message">에러 메시지</p>
  </div>
</body>
</html>
