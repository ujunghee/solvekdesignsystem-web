<!DOCTYPE html>
<html lang="ko">

</head>
<body>


  <p class="body3-r-14 color-gray-700 pt-16">blue button</p>

  <!-- disabled button s -->
  <button disabled type="button" class="button-48">
    disabled button
    <span class="icon-arrow-right-90deg-white"></span>
  </button>
  <!-- disabled button e -->

  <!-- blue button s -->
  <button type="button" class="blue-button-48 icon-button-right flex align-center">

  <button type="button" class="blue-button-48 icon-button-left flex align-center">

  </button>
  
  <button type="button" class="blue-button-28">
    blue button

  <!-- slate button s -->

  <button type="button" class="slate-button-48 icon-button-right flex align-center">

    <span class="chevron-right-white" aria-hidden="true"></span>

  <button type="button" class="slate-button-48 icon-button-left flex align-center">
    <span class="chevron-right-white" aria-hidden="true"></span>
    blue button
  </button>

  <p class="body3-r-14 color-gray-700 pt-16">slate button</p>


   <button type="button" class="slate-button-48">
    slate button

   <button type="button" class="slate-button-40">

   </button>

   <button type="button" class="slate-button-36">

  <p class="body3-r-14 color-gray-700 pt-16">blue 50 button</p>

  <!-- blue 50 button s -->
  <button type="button" class="blue-50-button-48">
    blue 50 button
  </button>

  <button type="button" class="blue-50-button-40">
    blue 50 button
  </button>
  
  <button type="button" class="blue-50-button-36">
    blue 50 button
  </button>
  
  <button type="button" class="blue-50-button-32">
    blue 50 button
  </button>
  
  <button type="button" class="blue-50-button-28">
    blue 50 button
  </button>
  
  <!-- blue 50 button e -->
  

  <p class="body3-r-14 color-gray-700 pt-16">border slate button</p>

  <!-- border slate button s -->
  <button type="button" class="border-slate-button-48">
    border button
   </button>

   <button type="button" class="border-slate-button-40">
    border button
   </button>

   <button type="button" class="border-slate-button-36">
    border button
   </button>

   <button type="button" class="border-slate-button-32">
    border button
   </button>

   <button type="button" class="border-slate-button-28">
    border button

  <!-- border slate button e -->


  <p class="body3-r-14 color-gray-700 pt-16">slate 50 icon button</p>

  <button type="button" class="slate-50-button-48 icon-button-right flex align-center">
    slate button
    <span class="chevron-right-slate-700" aria-hidden="true"></span>
  </button>

  <button type="button" class="slate-50-button-48 icon-button-left flex align-center">
    <span class="chevron-right-slate-700" aria-hidden="true"></span>
    blue button
  </button>

  <p class="body3-r-14 color-gray-700 pt-16">slate 50 button</p>
  
  <!-- slate 50 button s -->
  <button type="button" class="slate-50-button-48">
    slate 50 button
   </button>
   <button type="button" class="slate-50-button-40">

   </button>
   <button type="button" class="slate-50-button-36">

  <!-- transparent button s -->
  <button type="button" class="transparent-button-48">
    transparent button
   </button>
   <button type="button" class="transparent-button-40">
    transparent button
   </button>
   <button type="button" class="transparent-button-36">
    transparent button
   </button>
   <button type="button" class="transparent-button-32">
    transparent button
   </button>
   <button type="button" class="transparent-button-28">
    transparent button
   </button>
  <!-- transparent button e -->



  <p class="body3-r-14 color-gray-700 pt-16">아이콘 조합</p>

  <!-- functional reset icon button s -->
  <button type="button" class="transparent-button-32 flex align-center gap-10">
    <span class="body2-m-16 color-slate-500">초기화</span>
    <i class="filter-reset-20" aria-hidden="true"></i>
    <span class="blind">필터 초기화</span>
  </button>

  <button type="button" class="transparent-button-32 flex align-center gap-10">
    <span class="body2-m-16 color-slate-500">초기화</span>
    <i class="applied-reset-icon" aria-hidden="true"></i>
    <span class="blind">적용된 필터 초기화</span>
  </button>
  <!-- functional reset icon button e -->

  <!-- dropdown toggle button s -->
  <button type="button" class="border-slate-button-40 flex align-center gap-8" aria-expanded="false">
    고급 검색
    <i class="arrow-icon" aria-hidden="true"></i>
  </button>
  <!-- dropdown toggle button e -->

  <!-- remove icon button s -->
  <button type="button" class="transparent-button-32 flex align-center gap-6">
    <span class="body2-m-16 color-slate-700">대기</span>
    <i class="chips-close-icon" aria-hidden="true"></i>
    <span class="blind">삭제</span>
  </button>
  <!-- remove icon button e -->

  <!-- filter trigger button s -->
  <button type="button" class="border-slate-button-40 flex align-center gap-8" aria-pressed="false">
    검색필터
    <i class="filter-icon" aria-hidden="true"></i>
  </button>

  <button type="button" class="border-slate-button-40 flex align-center gap-8 active" aria-pressed="true">
    검색필터
    <i class="filter-icon active" aria-hidden="true"></i>
  </button>
  <!-- filter trigger button e -->

  <!-- view toggle button s -->
  <div class="view-toggle" role="group" aria-label="보기 방식">
    <button type="button" class="view-toggle__btn active" aria-pressed="true">
      <i class="dashboards-blue-icon view-toggle__icon view-toggle__icon--active" aria-hidden="true"></i>
      <i class="dashboards-gray-icon view-toggle__icon view-toggle__icon--inactive" aria-hidden="true"></i>
      <span class="body2-r-16 color-slate-700">카드형</span>
    </button>
    <button type="button" class="view-toggle__btn" aria-pressed="false">
      <i class="list-blue-icon view-toggle__icon view-toggle__icon--active" aria-hidden="true"></i>
      <i class="list-gray-icon view-toggle__icon view-toggle__icon--inactive" aria-hidden="true"></i>
      <span class="body2-r-16 color-slate-700">리스트형</span>
    </button>
  </div>
  <!-- view toggle button e -->

  <script>
    document.querySelectorAll('.view-toggle').forEach((group) => {
      group.querySelectorAll('.view-toggle__btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          group.querySelectorAll('.view-toggle__btn').forEach((item) => {
            item.classList.remove('active');
            item.setAttribute('aria-pressed', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-pressed', 'true');
        });
      });
    });
  </script>

</body>
</html>
