  <!DOCTYPE html>
  <html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>datepicker</title>

    <link rel="stylesheet" type="text/css" href="/css/index.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">

    <!-- datapicker s -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/ko.js"></script>
    <!-- datapicker e -->

    <script src="./datepicker.js"></script>

  </head>
  <body>

    <!-- datapicker -->
    <div class="input-wrapper">
      <label class="body2-r-16 color-slate-900 mb-6 block" for="input-datepicker">datapicker</label>
      <div class="relative w-fit flex align-center">
        <input type="text" id="input-datepicker" class="input-field-default-48 input-with-trailing-icon" placeholder="날짜를 선택해주세요" autocomplete="off">
        <button type="button" class="absolute right-0 top-50 translate-y-50" data-datepicker-for="input-datepicker">
          <i class="calendar-icon" aria-hidden="true"></i>
          <span class="blind">날짜 선택</span>
        </button>
      </div>
    </div>

    <!-- datapicker range -->
    <div class="input-wrapper">
      <label class="body2-r-16 color-slate-900 mb-6 block" for="input-datepicker-range">datapicker (range)</label>
      <div class="relative w-fit flex align-center">
        <input type="text" id="input-datepicker-range" class="input-field-default-48 input-with-trailing-icon" placeholder="시작일 ~ 종료일" autocomplete="off">
        <button type="button" class="absolute right-0 top-50 translate-y-50" data-datepicker-for="input-datepicker-range">
          <i class="calendar-icon" aria-hidden="true"></i>
          <span class="blind">기간 선택</span>
        </button>
      </div>
    </div>

  </body>
  </html>
