<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>applied filter component</title>

  <link rel="stylesheet" type="text/css" href="/css/index.css">
</head>
<body>

  <div class="inner-default py-24">

    <p class="body3-r-14 color-gray-700 pt-16">적용된 필터 1개</p>

    <!-- applied filter s -->
    <div class="applied-filter bg-slate-50 radius-md-8 px-16 py-16 flex justify-between align-start gap-8">
      <div class="applied-filter__list flex align-start gap-16">
        <span class="flex gap-8 align-center body2-sb-16 color-slate-900 flex-shrink-0-auto pt-4">적용된 필터 <span class="applied-filter__count color-blue-500">1</span></span>
        <ul class="flex flex-wrap gap-8">
          <li>
            <div class="chip border-slate-500 border h-36 w-fit px-12 radius-md-6 gap-6 flex align-center justify-center bg-white">
              <span class="body2-r-16 color-slate-700">지정유산</span>
              <button type="button" class="chips-close-icon" data-applied-filter-remove>
                <span class="blind">지정유산 필터 삭제</span>
              </button>
            </div>
          </li>
        </ul>
      </div>
      <button type="button" class="applied-filter__reset flex align-center gap-10 h-36" data-applied-filter-reset>
        <span class="body2-m-16 color-slate-700">초기화</span>
        <i class="applied-reset-icon" aria-hidden="true"></i>
        <span class="blind">적용된 필터 초기화</span>
      </button>
    </div>
    <!-- applied filter e -->


    <p class="body3-r-14 color-gray-700 pt-16">적용된 필터 여러 개</p>

    <!-- applied filter multiple s -->
    <div class="applied-filter bg-slate-50 radius-md-8 px-16 py-16 flex justify-between align-start gap-8">
      <div class="applied-filter__list flex align-start gap-16">
        <span class="flex gap-8 align-center body2-sb-16 color-slate-900 flex-shrink-0-auto pt-4">적용된 필터 <span class="applied-filter__count color-blue-500">3</span></span>
        <ul class="flex flex-wrap gap-8">
          <li>
            <div class="chip border-slate-500 border h-36 w-fit px-12 radius-md-6 gap-6 flex align-center justify-center bg-white">
              <span class="body2-r-16 color-slate-700">지정유산</span>
              <button type="button" class="chips-close-icon" data-applied-filter-remove>
                <span class="blind">지정유산 필터 삭제</span>
              </button>
            </div>
          </li>
          <li>
            <div class="chip border-slate-500 border h-36 w-fit px-12 radius-md-6 gap-6 flex align-center justify-center bg-white">
              <span class="body2-r-16 color-slate-700">국가지정문화유산</span>
              <button type="button" class="chips-close-icon" data-applied-filter-remove>
                <span class="blind">국가지정문화유산 필터 삭제</span>
              </button>
            </div>
          </li>
          <li>
            <div class="chip border-slate-500 border h-36 w-fit px-12 radius-md-6 gap-6 flex align-center justify-center bg-white">
              <span class="body2-r-16 color-slate-700">서울특별시</span>
              <button type="button" class="chips-close-icon" data-applied-filter-remove>
                <span class="blind">서울특별시 필터 삭제</span>
              </button>
            </div>
          </li>
        </ul>
      </div>
      <button type="button" class="applied-filter__reset flex align-center gap-10 h-36" data-applied-filter-reset>
        <span class="body2-m-16 color-slate-700">초기화</span>
        <i class="applied-reset-icon" aria-hidden="true"></i>
        <span class="blind">적용된 필터 초기화</span>
      </button>
    </div>
    <!-- applied filter multiple e -->

  </div>

  <script src="/solvek-web/js/applied-filter.js"></script>

</body>
</html>
