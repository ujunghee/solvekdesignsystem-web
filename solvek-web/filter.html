<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검색필터 예시 | 솔브케이</title>
  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
</head>
<body>
  <div class="inner-default py-24">
    <!-- 적용된 필터 s -->
    <div class="applied-filter bg-slate-50 radius-md-8 px-16 py-16 flex justify-between align-start gap-8 mb-24">
      <div class="applied-filter__list flex align-start gap-16">
        <span class="flex gap-8 align-center body2-sb-16 color-slate-900 flex-shrink-0-auto pt-4">적용된 필터 <span class="applied-filter__count color-blue-500">1</span></span>
        <ul class="flex flex-wrap gap-8">
          <li>
            <div class="chip border-slate-500 border h-36 w-fit px-12 radius-md-6 gap-6 flex align-center justify-center bg-white">
              <span class="body2-r-16 color-slate-700">지정유산</span>
              <button type="button" class="chips-close-icon" data-applied-filter-remove>
                <span class="blind">지정유산 필터 삭제</span>
              </button>
            </div>
          </li>
        </ul>
      </div>
      <button type="button" class="mt-2 applied-filter__reset transparent-button-32 flex align-center gap-10" data-applied-filter-reset>
        <span class="body2-m-16 color-slate-700">초기화</span>
        <i class="applied-reset-icon" aria-hidden="true"></i>
        <span class="blind">적용된 필터 초기화</span>
      </button>
    </div>
    <!-- 적용된 필터 e -->

    <aside class="search-filter" aria-labelledby="search-filter-title">
      <div class="search-filter__head flex justify-between align-center">
        <h2 id="search-filter-title" class="search-filter__title heading10-sb-20 color-slate-900">검색필터 예시</h2>
        <button type="button" class="search-filter__reset transparent-button-32 flex align-center gap-10" data-search-filter-reset>
          <span class="body2-m-16 color-slate-500">초기화</span>
          <i class="filter-reset-20" aria-hidden="true"></i>
          <span class="blind">필터 초기화</span>
        </button>
      </div>

      <!-- 패턴: 1열 + 건수 (search-filter__list + search-filter__count) -->
      <div class="search-filter__section active">
        <button type="button" class="search-filter__toggle body1-m-18 color-slate-900 flex align-center justify-between w-full" aria-expanded="true" data-search-filter-toggle>
          1열 + 건수
          <i class="arrow-icon" aria-hidden="true"></i>
        </button>
        <div class="search-filter__panel">
          <ul class="search-filter__list">
            <li class="search-filter__item">
              <div class="flex align-center justify-between gap-8">
                <div class="flex align-center gap-8">
                  <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-count-1" checked>
                  <label for="filter-count-1" class="body2-r-16 color-slate-900">필터 항목 1</label>
                </div>
                <span class="search-filter__count body3-r-14 color-slate-500 text-nowrap">1,234</span>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center justify-between gap-8">
                <div class="flex align-center gap-8">
                  <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-count-2">
                  <label for="filter-count-2" class="body2-r-16 color-slate-900">긴 라벨 줄바꿈 확인용 예시 텍스트</label>
                </div>
                <span class="search-filter__count body3-r-14 color-slate-500 text-nowrap">567</span>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center justify-between gap-8">
                <div class="flex align-center gap-8">
                  <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-count-3">
                  <label for="filter-count-3" class="body2-r-16 color-slate-900">필터 항목 3</label>
                </div>
                <span class="search-filter__count body3-r-14 color-slate-500 text-nowrap">89</span>
              </div>
            </li>
          </ul>
        </div>
      </div>

      <!-- 패턴: 1열 체크박스 (search-filter__list) -->
      <div class="search-filter__section active">
        <button type="button" class="search-filter__toggle body1-m-18 color-slate-900 flex align-center justify-between w-full" aria-expanded="true" data-search-filter-toggle>
          1열 체크박스
          <i class="arrow-icon" aria-hidden="true"></i>
        </button>
        <div class="search-filter__panel">
          <ul class="search-filter__list">
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-col1-1">
                <label for="filter-col1-1" class="body2-r-16 color-slate-900">옵션 A</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-col1-2">
                <label for="filter-col1-2" class="body2-r-16 color-slate-900">옵션 B</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-col1-3">
                <label for="filter-col1-3" class="body2-r-16 color-slate-900">옵션 C — 긴 라벨 줄바꿈 확인용</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-col1-4">
                <label for="filter-col1-4" class="body2-r-16 color-slate-900">옵션 D</label>
              </div>
            </li>
          </ul>
        </div>
      </div>

      <!-- 패턴: 2열 체크박스 (search-filter__list--cols-2) -->
      <div class="search-filter__section active">
        <button type="button" class="search-filter__toggle body1-m-18 color-slate-900 flex align-center justify-between w-full" aria-expanded="true" data-search-filter-toggle>
          2열 체크박스
          <i class="arrow-icon" aria-hidden="true"></i>
        </button>
        <div class="search-filter__panel">
          <ul class="search-filter__list search-filter__list--cols-2">
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-col2-1">
                <label for="filter-col2-1" class="body2-r-16 color-slate-900">옵션 1</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-col2-2">
                <label for="filter-col2-2" class="body2-r-16 color-slate-900">옵션 2</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-col2-3">
                <label for="filter-col2-3" class="body2-r-16 color-slate-900">옵션 3</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-col2-4">
                <label for="filter-col2-4" class="body2-r-16 color-slate-900">옵션 4</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-col2-5">
                <label for="filter-col2-5" class="body2-r-16 color-slate-900">긴 라벨 예시</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="checkbox" class="checkbox-basic checkbox-basic-md" id="filter-col2-6">
                <label for="filter-col2-6" class="body2-r-16 color-slate-900">옵션 6</label>
              </div>
            </li>
          </ul>
        </div>
      </div>

      <!-- 패턴: 기간 type1 (라디오 + 시작일·종료일 datepicker) -->
      <div class="search-filter__section active">
        <button type="button" class="search-filter__toggle body1-m-18 color-slate-900 flex align-center justify-between w-full" aria-expanded="true" data-search-filter-toggle>
          기간 type1
          <i class="arrow-icon" aria-hidden="true"></i>
        </button>
        <div class="search-filter__panel">
          <ul class="search-filter__list search-filter__list--cols-2 search-filter__period-radios">
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="radio" name="filter-period" class="radio-basic radio-basic-md" id="filter-period-all" value="all" checked>
                <label for="filter-period-all" class="body2-r-16 color-slate-900">기간 전체</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="radio" name="filter-period" class="radio-basic radio-basic-md" id="filter-period-1y" value="1y">
                <label for="filter-period-1y" class="body2-r-16 color-slate-900">최근 1년</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="radio" name="filter-period" class="radio-basic radio-basic-md" id="filter-period-3y" value="3y">
                <label for="filter-period-3y" class="body2-r-16 color-slate-900">최근 3년</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="radio" name="filter-period" class="radio-basic radio-basic-md" id="filter-period-5y" value="5y">
                <label for="filter-period-5y" class="body2-r-16 color-slate-900">최근 5년</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="radio" name="filter-period" class="radio-basic radio-basic-md" id="filter-period-custom" value="custom">
                <label for="filter-period-custom" class="body2-r-16 color-slate-900">직접 설정</label>
              </div>
            </li>
          </ul>
          <div class="search-filter__period-dates">
            <div class="search-filter__period-date flex align-center gap-8">
              <label for="filter-period-start" class="search-filter__period-label body2-r-16 color-slate-900">시작일자</label>
              <div class="input-wrapper flex-1">
                <div class="relative w-full flex align-center">
                  <input type="text" id="filter-period-start" class="input-field-default-40 input-with-trailing-icon w-full" placeholder="연도-월-일" autocomplete="off" disabled>
                  <button type="button" class="absolute right-0 top-50 translate-y-50" data-datepicker-for="filter-period-start" disabled>
                    <i class="calendar-icon" aria-hidden="true"></i>
                    <span class="blind">시작일자 선택</span>
                  </button>
                </div>
              </div>
            </div>
            <div class="search-filter__period-date flex align-center gap-8">
              <label for="filter-period-end" class="search-filter__period-label body2-r-16 color-slate-900">종료일자</label>
              <div class="input-wrapper flex-1">
                <div class="relative w-full flex align-center">
                  <input type="text" id="filter-period-end" class="input-field-default-40 input-with-trailing-icon w-full" placeholder="연도-월-일" autocomplete="off" disabled>
                  <button type="button" class="absolute right-0 top-50 translate-y-50" data-datepicker-for="filter-period-end" disabled>
                    <i class="calendar-icon" aria-hidden="true"></i>
                    <span class="blind">종료일자 선택</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 패턴: 기간 type2 (라디오 + range datepicker) -->
      <div class="search-filter__section active">
        <button type="button" class="search-filter__toggle body1-m-18 color-slate-900 flex align-center justify-between w-full" aria-expanded="true" data-search-filter-toggle>
          기간 type2
          <i class="arrow-icon" aria-hidden="true"></i>
        </button>
        <div class="search-filter__panel">
          <ul class="search-filter__list search-filter__list--cols-2 search-filter__period-radios">
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="radio" name="filter-period-2" class="radio-basic radio-basic-md" id="filter-period-2-all" value="all" checked>
                <label for="filter-period-2-all" class="body2-r-16 color-slate-900">기간 전체</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="radio" name="filter-period-2" class="radio-basic radio-basic-md" id="filter-period-2-1y" value="1y">
                <label for="filter-period-2-1y" class="body2-r-16 color-slate-900">최근 1년</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="radio" name="filter-period-2" class="radio-basic radio-basic-md" id="filter-period-2-3y" value="3y">
                <label for="filter-period-2-3y" class="body2-r-16 color-slate-900">최근 3년</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="radio" name="filter-period-2" class="radio-basic radio-basic-md" id="filter-period-2-5y" value="5y">
                <label for="filter-period-2-5y" class="body2-r-16 color-slate-900">최근 5년</label>
              </div>
            </li>
            <li class="search-filter__item">
              <div class="flex align-center gap-8">
                <input type="radio" name="filter-period-2" class="radio-basic radio-basic-md" id="filter-period-2-custom" value="custom">
                <label for="filter-period-2-custom" class="body2-r-16 color-slate-900">직접 설정</label>
              </div>
            </li>
          </ul>
          <div class="search-filter__period-range pb-16">
            <div class="input-wrapper">
              <label for="filter-period-range" class="blind">기간</label>
              <div class="relative w-full flex align-center">
                <input type="text" id="filter-period-range" class="input-field-default-40 input-with-trailing-icon w-full" placeholder="시작일 ~ 종료일" autocomplete="off" disabled>
                <button type="button" class="absolute right-0 top-50 translate-y-50" data-datepicker-for="filter-period-range" disabled>
                  <i class="calendar-icon" aria-hidden="true"></i>
                  <span class="blind">기간 선택</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 패턴: 셀렉트 2개 (search-filter__selects) -->
      <div class="search-filter__section active">
        <button type="button" class="search-filter__toggle body1-m-18 color-slate-900 flex align-center justify-between w-full" aria-expanded="true" data-search-filter-toggle>
          셀렉트
          <i class="arrow-icon" aria-hidden="true"></i>
        </button>
        <div class="search-filter__panel">
          <div class="search-filter__selects flex gap-8 pb-16">
            <div class="select-wrapper flex-1">
              <label for="filter-select-1" class="blind">셀렉트 1</label>
              <select id="filter-select-1" class="select-40 flex align-center" name="filter-select-1" aria-label="셀렉트 1">
                <option value="all" selected>전체</option>
                <option value="option-a">옵션 A</option>
                <option value="option-b">옵션 B</option>
                <option value="option-c">옵션 C</option>
              </select>
              <p class="error-message">에러 메시지</p>
            </div>
            <div class="select-wrapper flex-1">
              <label for="filter-select-2" class="blind">셀렉트 2</label>
              <select id="filter-select-2" class="select-40 flex align-center" name="filter-select-2" aria-label="셀렉트 2">
                <option value="all" selected>전체</option>
                <option value="option-a">옵션 A</option>
                <option value="option-b">옵션 B</option>
              </select>
              <p class="error-message">에러 메시지</p>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/ko.js"></script>
  <script src="/js/datepicker.js"></script>
  <script src="/solvek-web/js/search-filter.js"></script>
  <script src="/solvek-web/js/applied-filter.js"></script>
</body>
</html>
