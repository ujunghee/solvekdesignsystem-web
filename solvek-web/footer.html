<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>footer | 솔브케이</title>
  <link rel="stylesheet" href="/css/index.css">
</head>
<body>
  <footer class="footer" role="contentinfo">
    <div class="footer__quick">
      <div class="inner-default">
        <ul class="footer__quick-list">
          <li>
            <button type="button" class="footer__quick-btn flex justify-between align-center w-full" aria-expanded="false">
              <span class="body2-r-16 color-slate-700">산하기관 / 연계기관</span>
              <i class="footer-plus-20" aria-hidden="true"></i>
              <span class="blind">메뉴 열기</span>
            </button>
          </li>
          <li>
            <button type="button" class="footer__quick-btn flex justify-between align-center w-full" aria-expanded="false">
              <span class="body2-r-16 color-slate-700">정부기관 / 공공 포털</span>
              <i class="footer-plus-20" aria-hidden="true"></i>
              <span class="blind">메뉴 열기</span>
            </button>
          </li>
          <li>
            <button type="button" class="footer__quick-btn flex justify-between align-center w-full" aria-expanded="false">
              <span class="body2-r-16 color-slate-700">현장 운영 기관</span>
              <i class="footer-plus-20" aria-hidden="true"></i>
              <span class="blind">메뉴 열기</span>
            </button>
          </li>
        </ul>
      </div>
    </div>

    <div class="footer__body">
    <div class="inner-default footer__inner">
      <div class="footer__brand">
        <a href="/" class="footer__logo" aria-label="기후에너지환경부 홈으로 이동">
          <img src="/image/icon/footer-logo.svg" alt="기후에너지환경부">
        </a>
      </div>

      <div class="footer__info flex justify-between align-start">
        <div class="footer__contact">
          <p class="body3-r-14 color-slate-700">(우)30103 세종특별자치시 도움6로 11 정부세종청사 6동</p>
          <p class="body3-b-14 color-slate-900 mt-8">민원실 1577-8866 (월~금 09:00~18:00, 공휴일 제외)</p>
        </div>
        <a href="/service/instructionsForUse.do" class="footer__guide body3-r-14 color-slate-700 flex align-center gap-8">
          이용안내
          <span class="chevron-right-slate-700" aria-hidden="true"></span>
        </a>
      </div>

      <div class="footer__divider border-t border-slate-200 mt-28 mb-16" role="presentation" aria-hidden="true"></div>

      <div class="footer__bottom flex justify-between align-center">
        <ul class="footer__policy-list flex flex-wrap gap-16">
          <li><a href="/terms.do" class="body4-r-13 color-slate-500">이용약관</a></li>
          <li><a href="/privacy.do" class="body4-r-13 color-slate-500">개인정보처리방침</a></li>
          <li><a href="/email-reject.do" class="body4-r-13 color-slate-500">이메일무단수집거부</a></li>
          <li><a href="/copyright.do" class="body4-r-13 color-slate-500">저작권보호정책</a></li>
        </ul>
        <p class="body4-r-13 color-slate-500">© Ministry of Climate, Energy and Environment. The Government of the Republic of Korea. All rights reserved.</p>
      </div>
    </div>
    </div>
  </footer>
</body>
</html>
